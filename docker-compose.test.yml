services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: phirewall_test
      MYSQL_DATABASE: phirewall_test
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pphirewall_test", "--silent"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: phirewall_test
      POSTGRES_PASSWORD: phirewall_test
      POSTGRES_DB: phirewall_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phirewall_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  php:
    build:
      context: .
      dockerfile: Dockerfile.test
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
